name: AES256 Simulation CI

on:
  push:
    branches:
      - '*'
  pull_request:
    branches:
      - '*'
  schedule:
    - cron: '0 3 * * *'

jobs:
  simulate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ hashFiles('Dockerfile') }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: aes_256:latest
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Run encryption testbench
        run: |
          docker run --rm --workdir /home/dev/aes256_verilog aes_256 make sim TB=encryption

      - name: Run key expansion testbench
        run: |
          docker run --rm --workdir /home/dev/aes256_verilog aes_256 make sim TB=key_expansion

      - name: Run inverse cipher testbench
        run: |
          docker run --rm --workdir /home/dev/aes256_verilog aes_256 make sim TB=inverse_cipher